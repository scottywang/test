<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的互動課表</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-light: #888888;
            --checked-bg: #e2f0d9;
            --checked-border: #70ad47;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* 星期區塊 */
        .day-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .day-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 8px;
            margin-top: 0;
            margin-bottom: 12px;
        }

        /* 課程項目 */
        .course-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #eef2f5;
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        /* 隱藏原生 checkbox */
        .course-item input[type="checkbox"] {
            display: none;
        }

        /* 自訂勾選圓圈 */
        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .custom-checkbox::after {
            content: "✓";
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }

        .course-info {
            flex-grow: 1;
        }

        .course-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .course-time {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* 勾選後的樣式變更 */
        .course-item.completed {
            background-color: var(--checked-bg);
            border-color: var(--checked-border);
            opacity: 0.8;
        }

        .course-item.completed .custom-checkbox {
            background-color: var(--checked-border);
            border-color: var(--checked-border);
        }

        .course-item.completed .custom-checkbox::after {
            display: block;
        }

        .course-item.completed .course-name {
            text-decoration: line-through;
            color: #555;
        }

        /* 重置按鈕 */
        .reset-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2);
        }
    </style>
</head>
<body>

    <h1>📅 我的本週課表</h1>

    <div class="day-section">
        <div class="day-title">星期一</div>
        
        <label class="course-item" data-id="mon-1">
            <input type="checkbox">
            <span class="custom-checkbox"></span>
            <div class="course-info">
                <div class="course-name">微積分 (一)</div>
                <div class="course-time">09:00 - 12:00 | 綜合成議大樓 302</div>
            </div>
        </label>

        <label class="course-item" data-id="mon-2">
            <input type="checkbox">
            <span class="custom-checkbox"></span>
            <div class="course-info">
                <div class="course-name">大學英文</div>
                <div class="course-time">13:30 - 15:20 | 語文館 101</div>
            </div>
        </label>
    </div>

    <div class="day-section">
        <div class="day-title">星期二</div>
        
        <label class="course-item" data-id="tue-1">
            <input type="checkbox">
            <span class="custom-checkbox"></span>
            <div class="course-info">
                <div class="course-name">普通物理</div>
                <div class="course-time">10:10 - 12:00 | 理學館 204</div>
            </div>
        </label>
    </div>

    <div class="day-section">
        <div class="day-title">星期三</div>
        <p style="color: #aaa; font-size: 0.9rem; margin-left: 5px;">今天沒課，放假！</p>
    </div>

    <button class="reset-btn" onclick="resetCheckboxes()">重置所有課表（新的一週）</button>

    <script>
        // 當網頁載入時，自動回復上一次的勾選狀態
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.course-item input[type="checkbox"]');
            
            checkboxes.forEach(checkbox => {
                const courseItem = checkbox.closest('.course-item');
                const id = courseItem.getAttribute('data-id');
                
                // 檢查 LocalStorage 是否有紀錄
                if (localStorage.getItem(id) === 'true') {
                    checkbox.checked = true;
                    courseItem.classList.add('completed');
                }

                // 監聽點擊事件
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        courseItem.classList.add('completed');
                        localStorage.setItem(id, 'true');
                    } else {
                        courseItem.classList.remove('completed');
                        localStorage.setItem(id, 'false');
                    }
                });
            });
        </script>
        <script>
        // 重置功能
        function resetCheckboxes() {
            if (confirm('確定要清除本週的所有上課紀錄嗎？')) {
                const checkboxes = document.querySelectorAll('.course-item input[type="checkbox"]');
                checkboxes.forEach(checkbox => {
                    checkbox.checked = false;
                    checkbox.closest('.course-item').classList.remove('completed');
                });
                localStorage.clear();
            }
        }
    </script>
</body>
</html>
